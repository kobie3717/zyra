name: Wiki Copilot Dispatch

on:
  workflow_dispatch:
  schedule:
    - cron: '30 9 * * 1'

permissions:
  contents: read
  issues: write

concurrency:
  group: wiki-copilot-dispatch
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Upsert issue and ping Copilot
        uses: actions/github-script@v7
        with:
          script: |
            const isManual = context.eventName === 'workflow_dispatch'
            const agent = 'wiki-maintainer'
            const task = isManual
              ? 'Manual run: review and update wiki with Home/Sidebar/Footer consistency.'
              : 'Weekly run: audit and update technical wiki and operational runbooks.'

            const owner = context.repo.owner
            const repo = context.repo.repo
            const marker = '<!-- wiki-copilot-agent -->'
            const labels = ['documentation', 'wiki', 'copilot', 'wiki-agent']

            const search = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'wiki-agent',
              per_page: 50,
            })

            let target = search.data.find(i => (i.body || '').includes(marker))

            if (!target) {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title: '[Wiki Agent] Copilot Orchestration',
                labels,
                body: `${marker}\n\nOrchestration issue for Copilot wiki agent tasks.`,
              })
              target = created.data
            }

            const body = [
              `@copilot use the agent \`${agent}\` and execute this task.`,
              '',
              '## Task',
              task,
              '',
              '## Context',
              `- Repository: ${owner}/${repo}`,
              '- Target branch: master',
              `- Workflow: ${context.workflow}`,
              `- Run: ${context.runId}`,
            ].join('\n')

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: target.number,
              body,
            })

            core.notice(`Copilot ping sent on issue #${target.number}: ${target.html_url}`)
