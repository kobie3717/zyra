services:
  zyra:
    build: .
    restart: unless-stopped
    volumes:
      - zyra-data:/app/data
    environment:
      WA_CONNECTION_ID: default
      WA_REDIS_URL: redis://redis:6379
      MYSQL_URL: mysql://zyra:zyra@mysql:3306/zyra
      WA_ANTIBAN_ENABLED: "true"
      WA_ANTIBAN_METRICS_ENABLED: "true"
    ports:
      - "9108:9108"   # Prometheus metrics
      - "9109:9109"   # Health check
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:9109/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env

  backfill:
    build: .
    restart: unless-stopped
    command: ["node", "dist/core/db/backfill.js"]
    volumes:
      - zyra-data:/app/data
    environment:
      WA_CONNECTION_ID: default
      MYSQL_URL: mysql://zyra:zyra@mysql:3306/zyra
      WA_BACKFILL_ONCE: "false"
      WA_BACKFILL_INTERVAL_MS: "30000"
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: zyra
      MYSQL_USER: zyra
      MYSQL_PASSWORD: zyra
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  zyra-data:
  mysql-data:
  redis-data:
